version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ai_healthcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant/data:/qdrant/storage

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000
      QDRANT_URL: http://qdrant:6333
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/ai_healthcare
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
    depends_on:
      - api
